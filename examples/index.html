<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React PDF Builder - Examples</title>
    <script type="importmap">
    {
      "imports": {
        "react": "https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js",
        "react-dom/client": "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js",
        "react-pdf-builder": "../src/index.ts"
      }
    }
    </script>
</head>

<body>
    <div id="root"></div>
    <div style="padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; background: #f0f2f5;">
        <button id="btnBasic"
            style="padding: 10px 20px; background: #4338ca; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
            Basic Example
        </button>
        <button id="btnInvoice"
            style="padding: 10px 20px; background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
            Invoice Example
        </button>
    </div>
    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import BasicExample from './basic/App.tsx';
        import InvoiceExample from './invoice/App.tsx';

        const root = ReactDOM.createRoot(document.getElementById('root'));

        // Charger Basic par défaut
        root.render(React.createElement(BasicExample));

        // Gestion des boutons
        document.getElementById('btnBasic').addEventListener('click', () => {
            root.render(React.createElement(BasicExample));
        });

        document.getElementById('btnInvoice').addEventListener('click', () => {
            root.render(React.createElement(InvoiceExample));
        });
    </script>
</body>

</html>
